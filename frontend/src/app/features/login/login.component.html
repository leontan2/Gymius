<section class="login-page">
  <div class="login-copy">
    <div class="brand login-brand">
      <span class="brand-mark"><svg lucideIcon="dumbbell" size="24"></svg></span>
      <span>
        <strong>Gymius</strong>
        <small>Strength tracker</small>
      </span>
    </div>

    <div class="login-headline">
      <p class="eyebrow">Personal training log</p>
      <h1>Train with intent.</h1>
      <p>
        Capture every set, watch strength move over time, and keep your records tied to your Google account.
      </p>
    </div>

    <button class="btn primary login-btn" type="button" (click)="login()">
      <svg lucideIcon="log-in" size="20"></svg>
      <span>Continue with Google</span>
      <svg lucideIcon="arrow-right" size="18"></svg>
    </button>

    <div class="scope-note">
      <svg lucideIcon="shield-check" size="18"></svg>
      <span>Uses only Google profile and email scopes.</span>
    </div>
  </div>

  <div class="login-visual" aria-hidden="true">
    <div class="phone-frame">
      <div class="mini-topline">
        <span>Today</span>
        <strong>Upper Power</strong>
      </div>
      <div class="mini-ring">
        <span>18,420</span>
        <small>lb volume</small>
      </div>
      <div class="mini-bars">
        <span style="height: 42%"></span>
        <span style="height: 72%"></span>
        <span style="height: 56%"></span>
        <span style="height: 88%"></span>
        <span style="height: 66%"></span>
        <span style="height: 96%"></span>
      </div>
      <div class="mini-list">
        <div><svg lucideIcon="activity" size="16"></svg><span>Bench press</span><strong>225 x 5</strong></div>
        <div><svg lucideIcon="bar-chart-3" size="16"></svg><span>Deadlift</span><strong>365 x 3</strong></div>
      </div>
    </div>
  </div>
</section>
