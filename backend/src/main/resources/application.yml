server:
  address: 0.0.0.0
  port: ${PORT:${SERVER_PORT:8080}}
  forward-headers-strategy: framework
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: ${SESSION_COOKIE_SAME_SITE:lax}

spring:
  application:
    name: gymius
  main:
    lazy-initialization: ${SPRING_MAIN_LAZY_INITIALIZATION:false}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/gymius}
    username: ${DATABASE_USERNAME:gymius}
    password: ${DATABASE_PASSWORD:gymius}
  servlet:
    multipart:
      max-file-size: ${MEAL_IMAGE_MAX_SIZE:5MB}
      max-request-size: ${MEAL_IMAGE_MAX_SIZE:5MB}
  data:
    jpa:
      repositories:
        bootstrap-mode: ${SPRING_DATA_JPA_REPOSITORIES_BOOTSTRAP_MODE:default}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:}
            client-secret: ${GOOGLE_CLIENT_SECRET:}
            scope:
              - openid
              - profile
              - email

app:
  frontend-url: ${FRONTEND_URL:http://localhost:4200}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
  meal-vision:
    provider: ${MEAL_VISION_PROVIDER:mock}
    max-image-bytes: ${MEAL_IMAGE_MAX_BYTES:5242880}
  nutrition:
    default-daily-calories: ${DEFAULT_DAILY_CALORIES:2200}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-5-mini}
    image-detail: ${OPENAI_IMAGE_DETAIL:auto}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:gymius;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
